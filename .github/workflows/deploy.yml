name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Opción A: Vercel (para Supabase, gratis) ──────────────────────────────
  deploy-vercel:
    if: vars.DEPLOY_TARGET == 'vercel' || vars.DEPLOY_TARGET == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: { node-version: "18" }
      - run: npm ci && npm run build
        env:
          REACT_APP_BACKEND: supabase
          REACT_APP_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./build
          vercel-args: --prod

  # ── Opción B: Azure Static Web Apps ──────────────────────────────────────
  deploy-azure:
    if: vars.DEPLOY_TARGET == 'azure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          api_location: "api"
          output_location: "build"
        env:
          REACT_APP_BACKEND: azure
          REACT_APP_AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
